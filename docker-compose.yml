services:
  neo4j:
    image: neo4j:5
    container_name: pharma-kg-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  graph-init:
    build: .
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
    depends_on:
      neo4j:
        condition: service_healthy
    command: >
      sh -c "python scripts/clean.py && python scripts/import_neo4j.py --full"
    restart: "no"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      APP_ENV: ${APP_ENV:-demo}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      LOG_JSON: ${LOG_JSON:-true}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_DEMO_USERNAME: ${AUTH_DEMO_USERNAME:-admin}
      AUTH_DEMO_PASSWORD: ${AUTH_DEMO_PASSWORD:-change-me}
      AUTH_DEMO_ROLES: ${AUTH_DEMO_ROLES:-admin,data_steward,clinical_reviewer}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-3600}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-false}
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-/app/data/audit/events.jsonl}
    depends_on:
      graph-init:
        condition: service_completed_successfully
    volumes:
      - ./data/audit:/app/data/audit
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  neo4j_data:
